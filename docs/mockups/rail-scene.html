<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Midnight Yard — concept scene (R0)</title>
<style>
:root{
  --night:#080b12; --ink:#e8ecf4; --muted:#8a93a6; --line:#2c3442;
  --amber:#ffb454; --red:#ff3b4e;
  --disp:'Avenir Next Condensed','Arial Narrow',system-ui,sans-serif;
  --body:-apple-system,'Inter',system-ui,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{
  font-family:var(--body);color:var(--ink);
  background:
    radial-gradient(1100px 600px at 50% -8%, #141c2e 0%, transparent 62%),
    radial-gradient(800px 480px at 88% 108%, rgba(255,180,84,.06) 0%, transparent 55%),
    var(--night);
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;user-select:none;
}
.wrap{width:100%;max-width:470px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:13px}
header{width:100%;display:flex;align-items:flex-end;justify-content:space-between}
.brand .t1{
  font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:.055em;line-height:1;
  text-shadow:0 0 20px rgba(255,180,84,.32),0 0 2px rgba(255,180,84,.55);
  white-space:nowrap;
}
.brand .t1 b{color:var(--red);font-weight:700;text-shadow:0 0 18px rgba(255,59,78,.6)}
.brand .t2{font-size:9.5px;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-top:7px}
.hbtns{display:flex;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);
  background:linear-gradient(180deg,#1a2130,#131824);color:var(--muted);display:grid;place-items:center}
.icon-btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.hud{width:100%;display:grid;grid-template-columns:auto 1fr auto auto;gap:8px}
.chip{border:1px solid var(--line);border-radius:12px;padding:7px 12px;
  background:linear-gradient(180deg,#151b28cc,#111623cc)}
.chip .lab{font-size:8.5px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase}
.chip .val{font-family:var(--disp);font-weight:600;font-size:19px;margin-top:1px}
.chip.lv .val{color:var(--amber)}
.chip .stars{color:var(--amber);font-size:12px;letter-spacing:1px}
.chip .stars .off{color:#39415299}
.frame{
  position:relative;padding:15px;border-radius:26px;
  background:linear-gradient(160deg,#1d2534 0%,#141a26 45%,#0f131c 100%);
  box-shadow:0 30px 70px -18px rgba(0,0,0,.85),0 4px 14px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.07),inset 0 -2px 0 rgba(0,0,0,.5);
}
.scene{display:block;width:402px;height:402px;border-radius:13px}
.controls{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.btn{font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.1em;text-transform:uppercase;
  border-radius:14px;border:1px solid var(--line);padding:13px 8px;color:var(--ink);
  background:linear-gradient(180deg,#1b2230,#131a26);display:flex;align-items:center;justify-content:center;gap:8px}
.btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.accent{border-color:rgba(255,180,84,.4);color:var(--amber)}
.coach{font-size:12.5px;color:#a9b3c6;letter-spacing:.02em;text-align:center}
.coach b{color:var(--amber);font-weight:600}
.bodyrain{position:fixed;inset:0;pointer-events:none;opacity:.13}
@keyframes fall{to{transform:translateY(240px)}}
</style>
</head>
<body>

<svg class="bodyrain" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" viewBox="0 0 470 940">
  <g style="animation:fall .5s linear infinite">
    <g id="brg" stroke="#bcd0ff" stroke-width="1" opacity=".5">
      <line x1="30" y1="-40" x2="24" y2="-6"/><line x1="120" y1="-150" x2="114" y2="-116"/>

<div class="wrap">

          <rect x="126" y="48" width="36" height="14" rx="4" fill="#1a2634" opacity=".9"/>

          <circle cx="86" cy="35" r="11" fill="#8f6a12" stroke="#5e430a" stroke-width="2"/>
          <g stroke="#5e430a" stroke-width="2"><line x1="44" y1="27" x2="60" y2="43"/><line x1="78" y1="27" x2="94" y2="43"/></g>
          <g fill="#141a24"><rect x="8" y="12" width="7" height="46" rx="2"/><rect x="19" y="16" width="4" height="38" rx="2"/></g>
          <text x="132" y="40" font-size="12" fill="#332204" font-weight="bold">04</text>
          <circle cx="181" cy="22" r="3" fill="#fff6d8"/><circle cx="181" cy="48" r="3" fill="#fff6d8"/>
        </g>

        <!-- ============ HERO: red loco · row 2 · cols 0-1 ============ -->
        <g transform="translate(8,208)">
          <!-- headlight beam: reaches the blue blocker at x=400 (scene), fades before it -->
          <path d="M 186 28 L 400 12 L 400 74 L 186 58 Z" fill="url(#beam)"/>
          <rect x="4" y="12" width="182" height="62" rx="12" fill="url(#heroRed)" stroke="#000" stroke-opacity=".45" stroke-width="1.6"/>
          <rect x="4" y="12" width="182" height="11" rx="5" fill="#fff" opacity=".22"/>
          <g fill="#7d0d1a" opacity=".8"><rect x="16" y="22" width="66" height="42" rx="5"/></g>
          <g stroke="#5e0813" stroke-width="1.6" opacity=".8"><line x1="28" y1="24" x2="28" y2="62"/><line x1="42" y1="24" x2="42" y2="62"/><line x1="56" y1="24" x2="56" y2="62"/><line x1="70" y1="24" x2="70" y2="62"/></g>
          <circle cx="106" cy="43" r="12" fill="#a01527" stroke="#5e0813" stroke-width="2"/>
          <g stroke="#5e0813" stroke-width="2"><line x1="98" y1="35" x2="114" y2="51"/><line x1="114" y1="35" x2="98" y2="51"/></g>
          <rect x="128" y="8" width="50" height="70" rx="9" fill="url(#heroRed)" stroke="#000" stroke-opacity=".5" stroke-width="1.6"/>
          <rect x="136" y="15" width="34" height="15" rx="4" fill="#dff1ff" opacity=".85"/>
          <rect x="136" y="56" width="34" height="15" rx="4" fill="#9fc4dd" opacity=".7"/>
          <rect x="136" y="38" width="34" height="10" rx="3" fill="#ffb9c1" opacity=".5"/>
          <text x="141" y="46.5" font-size="9.5" fill="#3d030b" font-weight="bold" letter-spacing="1">M70</text>
          <circle cx="182" cy="28" r="4.4" fill="#fff8dd"/><circle cx="182" cy="58" r="4.4" fill="#fff8dd"/>
          <circle cx="182" cy="28" r="8" fill="#fff3c2" opacity=".4" filter="url(#soft2)"/>
          <circle cx="182" cy="58" r="8" fill="#fff3c2" opacity=".4" filter="url(#soft2)"/>
          <circle cx="8" cy="30" r="2.8" fill="#ff5b47"/><circle cx="8" cy="56" r="2.8" fill="#ff5b47"/>
          <circle cx="152" cy="6" r="3.2" fill="#ff3b4e">
            <animate attributeName="opacity" values="1;.25;1" dur="1.6s" repeatCount="indefinite"/>

          <circle cx="152" cy="6" r="8" fill="#ff3b4e" opacity=".35" filter="url(#soft2)">
            <animate attributeName="opacity" values=".35;.08;.35" dur="1.6s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- ============ SIGNALS ============ -->
        <!-- red signal guarding the depart lane, planted beside the blocker's lane -->
        <g transform="translate(392,308)">
          <rect x="-2" y="0" width="4" height="16" fill="#39435a"/>
          <rect x="-7" y="-16" width="14" height="20" rx="4" fill="#151b28" stroke="#39435a" stroke-width="1.4"/>

            <animate attributeName="opacity" values="1;.5;1" dur="2.2s" repeatCount="indefinite"/>

          <circle cx="0" cy="-6" r="10" fill="#ff4444" opacity=".3" filter="url(#soft2)"/>
          <ellipse cx="0" cy="20" rx="17" ry="5" fill="#ff4444" opacity=".13"/>
        </g>
        <!-- green signal on a clear lane -->
        <g transform="translate(196,396)">
          <rect x="-2" y="0" width="4" height="16" fill="#39435a"/>
          <rect x="-7" y="-16" width="14" height="20" rx="4" fill="#151b28" stroke="#39435a" stroke-width="1.4"/>
          <circle cx="0" cy="-6" r="4" fill="#54e69a"/>
          <circle cx="0" cy="-6" r="10" fill="#54e69a" opacity=".3" filter="url(#soft2)"/>
          <ellipse cx="0" cy="20" rx="17" ry="5" fill="#54e69a" opacity=".11"/>
        </g>

        <!-- yard lamps on free ground -->
        <g transform="translate(252,12)">
          <rect x="-2.5" y="0" width="5" height="28" fill="#2b3345"/>
          <circle cx="0" cy="2" r="5.5" fill="#cfe0ff" opacity=".95"/>
          <circle cx="0" cy="2" r="15" fill="#9db8e8" opacity=".4" filter="url(#soft)"/>

        <g transform="translate(470,586)">
          <rect x="-2.5" y="-28" width="5" height="28" fill="#2b3345"/>
          <circle cx="0" cy="-28" r="5.5" fill="#cfe0ff" opacity=".9"/>
          <circle cx="0" cy="-28" r="15" fill="#9db8e8" opacity=".4" filter="url(#soft)"/>
        </g>

        <!-- ============ GATE ============ -->
        <rect x="556" y="200" width="44" height="100" fill="url(#gateGlow)"/>
        <rect x="592" y="192" width="7" height="116" rx="3.5" fill="#ffb454">
          <animate attributeName="opacity" values=".85;1;.85" dur="2.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="586" y="192" width="14" height="116" rx="6" fill="#ffb454" opacity=".4" filter="url(#soft)"/>

        <!-- ============ RAIN ============ -->
        <g opacity=".5">
          <g style="animation:fall .45s linear infinite">
            <g id="rg" stroke="#cfe0ff" stroke-width="1.3" stroke-linecap="round">
              <line x1="60" y1="-30" x2="54" y2="2" opacity=".55"/><line x1="130" y1="-140" x2="124" y2="-108" opacity=".4"/>
              <line x1="205" y1="-60" x2="199" y2="-28" opacity=".3"/><line x1="280" y1="-180" x2="274" y2="-148" opacity=".45"/>
              <line x1="352" y1="-90" x2="346" y2="-58" opacity=".3"/><line x1="425" y1="-20" x2="419" y2="12" opacity=".5"/>
              <line x1="500" y1="-150" x2="494" y2="-118" opacity=".6"/><line x1="560" y1="-70" x2="554" y2="-38" opacity=".65"/>
              <line x1="95" y1="-210" x2="89" y2="-178" opacity=".5"/><line x1="470" y1="-220" x2="464" y2="-188" opacity=".45"/>
              <line x1="240" y1="-120" x2="234" y2="-88" opacity=".25"/><line x1="20" y1="-100" x2="14" y2="-68" opacity=".4"/>
            </g>
            <use href="#rg" y="240"/><use href="#rg" y="480"/><use href="#rg" y="720"/><use href="#rg" y="960"/>
          </g>
        </g>
        <g stroke="#bcd0ff" fill="none" opacity=".35">
          <circle cx="130" cy="449" r="5" stroke-width="1"><animate attributeName="r" values="2;12" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values=".5;0" dur="1.8s" repeatCount="indefinite"/></circle>
          <circle cx="480" cy="562" r="6" stroke-width="1"><animate attributeName="r" values="2;13" dur="2.3s" repeatCount="indefinite" begin=".7s"/><animate attributeName="opacity" values=".45;0" dur="2.3s" repeatCount="indefinite" begin=".7s"/></circle>
          <circle cx="516" cy="119" r="4" stroke-width="1"><animate attributeName="r" values="2;10" dur="2s" repeatCount="indefinite" begin="1.2s"/><animate attributeName="opacity" values=".5;0" dur="2s" repeatCount="indefinite" begin="1.2s"/></circle>
        </g>

        <ellipse cx="300" cy="-14" rx="380" ry="70" fill="#8ea4c9" opacity=".07" filter="url(#soft)"/>
        <rect width="600" height="600" filter="url(#grain)" opacity=".5"/>
        <rect width="600" height="600" fill="url(#vig)"/>
      </g>
    </svg>
  </div>

  <div class="coach">Tap the amber coupler to split the cut — <b>coupled cars move as one</b></div>

  <div class="controls">
    <button class="btn"><svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-3"/></svg>Undo</button>
    <button class="btn accent"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.6 1 2.3h6c0-.7.4-1.8 1-2.3A7 7 0 0 0 12 2z"/><path d="M9.5 21h5"/></svg>Hint</button>
    <button class="btn"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 2.6-6.3"/><path d="M3 4v5h5"/></svg>Reset</button>
  </div>
</div>
