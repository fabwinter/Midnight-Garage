<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Midnight Garage — city concept scene (R0 v2)</title>
<style>
:root{
  --night:#080b12; --ink:#e8ecf4; --muted:#8a93a6; --line:#2c3442;
  --amber:#ffb454; --red:#ff3b4e;
  --disp:'Avenir Next Condensed','Arial Narrow',system-ui,sans-serif;
  --body:-apple-system,'Inter',system-ui,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{
  font-family:var(--body);color:var(--ink);
  background:
    radial-gradient(1100px 600px at 50% -8%, #141c2e 0%, transparent 62%),
    radial-gradient(800px 480px at 88% 108%, rgba(255,180,84,.06) 0%, transparent 55%),
    var(--night);
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;user-select:none;
}
.wrap{width:100%;max-width:470px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:13px}
header{width:100%;display:flex;align-items:flex-end;justify-content:space-between}
.brand .t1{
  font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:.055em;line-height:1;
  text-shadow:0 0 20px rgba(255,180,84,.32),0 0 2px rgba(255,180,84,.55);white-space:nowrap;
}
.brand .t1 b{color:var(--red);font-weight:700;text-shadow:0 0 18px rgba(255,59,78,.6)}
.brand .t2{font-size:9.5px;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-top:7px}
.hbtns{display:flex;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);
  background:linear-gradient(180deg,#1a2130,#131824);color:var(--muted);display:grid;place-items:center}
.icon-btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.hud{width:100%;display:grid;grid-template-columns:auto 1fr auto auto;gap:8px}
.chip{border:1px solid var(--line);border-radius:12px;padding:7px 12px;
  background:linear-gradient(180deg,#151b28cc,#111623cc)}
.chip .lab{font-size:8.5px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase}
.chip .val{font-family:var(--disp);font-weight:600;font-size:19px;margin-top:1px}
.chip.lv .val{color:var(--amber)}
.chip .stars{color:var(--amber);font-size:12px;letter-spacing:1px}
.chip .stars .off{color:#39415299}
.frame{
  position:relative;padding:15px;border-radius:26px;
  background:linear-gradient(160deg,#1d2534 0%,#141a26 45%,#0f131c 100%);
  box-shadow:0 30px 70px -18px rgba(0,0,0,.85),0 4px 14px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.07),inset 0 -2px 0 rgba(0,0,0,.5);
}
.scene{display:block;width:402px;height:402px;border-radius:13px}
.controls{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.btn{font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.1em;text-transform:uppercase;
  border-radius:14px;border:1px solid var(--line);padding:13px 8px;color:var(--ink);
  background:linear-gradient(180deg,#1b2230,#131a26);display:flex;align-items:center;justify-content:center;gap:8px}
.btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.accent{border-color:rgba(255,180,84,.4);color:var(--amber)}
.coach{font-size:12.5px;color:#a9b3c6;letter-spacing:.02em;text-align:center}
.coach b{color:var(--amber);font-weight:600}
.bodyrain{position:fixed;inset:0;pointer-events:none;opacity:.13}
@keyframes fall{to{transform:translateY(240px)}}
@keyframes conduit{to{stroke-dashoffset:-28}}
</style>
</head>
