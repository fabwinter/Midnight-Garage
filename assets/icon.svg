<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- App icon (plan item 0.1): red car glyph on near-black, amber gate
       glow at the right edge. Designed to read at 60px. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="90%">
      <stop offset="0" stop-color="#1b2333"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </radialGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb454" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffb454" stop-opacity=".55"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a87"/>
      <stop offset=".45" stop-color="#ff3b4e"/>
      <stop offset="1" stop-color="#b3111f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fb6d8"/>
      <stop offset="1" stop-color="#41151d"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="704" y="192" width="320" height="640" fill="url(#gate)" opacity=".8"/>
  <rect x="948" y="212" width="18" height="600" rx="9" fill="#ffb454"/>
  <rect x="948" y="212" width="18" height="600" rx="9" fill="#ffb454" opacity=".5" filter="blur(4px)"/>
  <!-- asphalt lane dashes -->
  <g fill="#2c3442">
    <rect x="96" y="500" width="86" height="24" rx="12"/>
    <rect x="238" y="500" width="86" height="24" rx="12"/>
    <rect x="380" y="500" width="86" height="24" rx="12"/>
  </g>
  <!-- the red car, nose toward the gate -->
  <g>
    <rect x="196" y="588" width="132" height="66" rx="30" fill="#06080c"/>
    <rect x="600" y="588" width="132" height="66" rx="30" fill="#06080c"/>
    <rect x="128" y="380" width="736" height="252" rx="118" fill="url(#car)"/>
    <rect x="128" y="380" width="736" height="252" rx="118" fill="none" stroke="#000" stroke-opacity=".35" stroke-width="10"/>
    <path d="M 348 404 L 428 448 L 428 564 L 348 608 Z" fill="url(#glass)"/>
    <path d="M 700 412 L 630 452 L 630 560 L 700 600 Z" fill="url(#glass)" opacity=".9"/>
    <rect x="446" y="436" width="166" height="140" rx="54" fill="#ff8090"/>
    <rect x="446" y="448" width="166" height="34" rx="17" fill="#ffffff" opacity=".38"/>
    <circle cx="836" cy="446" r="26" fill="#fff6d8"/>
    <circle cx="836" cy="566" r="26" fill="#fff6d8"/>
    <g opacity=".5">
      <path d="M 856 430 L 986 396 L 986 470 Z" fill="#fff3c9" opacity=".4"/>
      <path d="M 856 582 L 986 616 L 986 542 Z" fill="#fff3c9" opacity=".4"/>
    </g>
  </g>
</svg>
